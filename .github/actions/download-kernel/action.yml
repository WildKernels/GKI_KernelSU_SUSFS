name: 'Download Kernel Repository'
description: 'Initialize and sync Android kernel source repository'

inputs:
  android_version:
    description: 'Android version (e.g., android14)'
    required: true
  kernel_version:
    description: 'Kernel version (e.g., 5.15, 6.1)'
    required: true
  os_patch_level:
    description: 'OS patch level (e.g., 2024-01)'
    required: true
  manifest_ref:
    description: 'Optional manifest branch override (e.g., common-android15-6.6)'
    required: false
    default: ''
  kernel_commit:
    description: 'Optional commit hash to checkout in kernel/common after sync'
    required: false
    default: ''

outputs:
  deprecated_branch:
    description: 'Whether the branch is deprecated'
    value: ${{ steps.sync.outputs.deprecated }}

runs:
  using: composite
  steps:
    - name: Initialize and Sync Kernel Repository
      id: sync
      shell: bash
      working-directory: ${{ github.workspace }}/kernel
      run: |
        FORMATTED_BRANCH="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.os_patch_level }}"
        MANIFEST_REF="${{ inputs.manifest_ref }}"

        if [ -z "$MANIFEST_REF" ]; then
          MANIFEST_REF="common-${FORMATTED_BRANCH}"
        fi

        # Initialize repo with the target branch/ref
        repo init -u https://android.googlesource.com/kernel/manifest -b "$MANIFEST_REF" --depth=1

        # Check if branch is deprecated (legacy branch mode only)
        DEFAULT_MANIFEST_PATH=.repo/manifests/default.xml
        DEPRECATED=false
        if [ -z "${{ inputs.manifest_ref }}" ]; then
          REMOTE_BRANCH=$(git ls-remote https://android.googlesource.com/kernel/common "${FORMATTED_BRANCH}" || true)
          if grep -q deprecated <<< "$REMOTE_BRANCH"; then
            sed -i "s/\"${FORMATTED_BRANCH}\"/\"deprecated\/${FORMATTED_BRANCH}\"/g" "$DEFAULT_MANIFEST_PATH"
            echo "⚠ Note: Branch ${FORMATTED_BRANCH} is considered deprecated."
            DEPRECATED=true
          fi
        fi

        echo "deprecated=$DEPRECATED" >> $GITHUB_OUTPUT

        # Sync kernel source
        repo --trace sync -c -j$(nproc --all) --fail-fast --no-tags --force-sync --no-clone-bundle

        # Optional hard pin of kernel/common commit for exact GKI releases
        if [ -n "${{ inputs.kernel_commit }}" ]; then
          git -C common fetch --depth=1 origin "${{ inputs.kernel_commit }}"
          git -C common checkout "${{ inputs.kernel_commit }}"
        fi

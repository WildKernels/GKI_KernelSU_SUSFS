name: 'Apply Kernel Branding & Timestamp'
description: 'Apply Wild kernel branding to kernel version string'
inputs:
  variant:
    description: 'Variant of kernel to apply branding to'
    required: true
  kernel_version:
    description: 'Kernel version (e.g., 6.1)'
    required: true
  android_version:
    description: 'Android version (e.g., android14)'
    required: true
  version:
    description: 'Combined version (e.g., android14-6.1)'
    required: true
  sublevel:
    description: 'Sublevel of kernel version (e.g., 1)'
    required: true
  root_solution:
    description: 'Selected root solution'
    required: true

runs:
  using: "composite"
  steps:
    - name: Apply Kernel Name Branding
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        if [[ "${{ inputs.root_solution }}" == "NONE" ]]; then
          KERNEL_STRING="${{ inputs.kernel_version }}.${{ inputs.sublevel }}-@Coolpak@Kugouzei_NB_LKM"
        else
          KERNEL_STRING="${{ inputs.kernel_version }}.${{ inputs.sublevel }}-@Coolpak@Kugouzei_NB_GKI"
        fi
        sed -i '$d' scripts/setlocalversion
        echo "echo \"$KERNEL_STRING\"" >> scripts/setlocalversion
        chmod +x scripts/setlocalversion

name: 'Apply Kernel Branding & Timestamp'
description: 'Apply Wild kernel branding to kernel version string'
inputs:
  variant:
    description: 'Variant of kernel to apply branding to'
    required: true
  kernel_version:
    description: 'Kernel version (e.g., 6.1)'
    required: true
  android_version:
    description: 'Android version (e.g., android14)'
    required: true
  version:
    description: 'Combined version (e.g., android14-6.1)'
    required: true
  sublevel:
    description: 'Sublevel of kernel version (e.g., 1)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Apply Kernel Name Branding
      shell: bash
      working-directory: ${{ github.workspace }}/kernel/common
      run: |
        CONFIG_FRAGMENT="${{ github.workspace }}/wild_gki.fragment"
        touch "$CONFIG_FRAGMENT"

        DEFCONFIG="${{ github.workspace }}/kernel/common/arch/arm64/configs/gki_defconfig"

        VERSION="${{ inputs.version }}"
        ANDROID_PART=$(echo "$VERSION" | cut -d- -f1)
        KERNEL_PART=$(echo "$VERSION" | cut -d- -f2)

        if [ "${{ inputs.variant }}" == "Wild" ]; then
          # 获取 git commit hash 用于伪装小米官方完整格式
          KERNEL_HASH=$(git rev-parse --short=12 HEAD 2>/dev/null | head -c 12)
          if [ -z "$KERNEL_HASH" ] || [ ${#KERNEL_HASH} -lt 12 ]; then
            KERNEL_HASH="614238d0d630"
          fi
          # 移除原 setlocalversion 的 echo 输出行
          tac scripts/setlocalversion | awk '!seen && /^echo / {seen=1; next} 1' | tac > scripts/setlocalversion.tmp
          mv scripts/setlocalversion.tmp scripts/setlocalversion
          if [[ "$KERNEL_PART" == "6.6" || "$KERNEL_PART" == "6.12" ]]; then
            KERNEL_STRING="$KERNEL_PART.${{ inputs.sublevel }}-$ANDROID_PART"
            echo "echo \"$KERNEL_STRING-android14-11-g${KERNEL_HASH}-mi\"" >> scripts/setlocalversion
          else
            # 输出完整小米官方格式: -android14-11-g<hash>-mi
            echo "echo \"-android14-11-g${KERNEL_HASH}-mi\"" >> scripts/setlocalversion
          fi
          chmod +x scripts/setlocalversion
        else
          if grep -q '^CONFIG_LOCALVERSION=' "$DEFCONFIG"; then
            LOCALVERSION_VALUE="$(grep -m1 '^CONFIG_LOCALVERSION=' "$DEFCONFIG" | sed -E 's/^CONFIG_LOCALVERSION="?([^"]*)"?$/\1/')"
           echo "CONFIG_LOCALVERSION=\"${LOCALVERSION_VALUE}-mi\"" >> "$CONFIG_FRAGMENT"
          else
            echo 'CONFIG_LOCALVERSION="-mi"' >> "$CONFIG_FRAGMENT"
          fi
        fi

        : > .scmversion

        echo "Spoofing build timestamp to match Xiaomi official build..."

        # 伪装小米官方编译时间 2026-02-03 05:51:45 UTC
        COMMIT_TIMESTAMP=1770097905

        export SOURCE_DATE_EPOCH=$COMMIT_TIMESTAMP
        echo "SOURCE_DATE_EPOCH=$COMMIT_TIMESTAMP" >> $GITHUB_ENV
        
        export KBUILD_BUILD_TIMESTAMP="@${COMMIT_TIMESTAMP}"
        echo "KBUILD_BUILD_TIMESTAMP=@${COMMIT_TIMESTAMP}" >> "$GITHUB_ENV"

        # 伪装 build user 和 host 为小米官方
        echo "KBUILD_BUILD_USER=builder" >> "$GITHUB_ENV"
        echo "KBUILD_BUILD_HOST=pangu-build-component-system" >> "$GITHUB_ENV"

    - name: Apply Kernel Configuration
      if: ${{ inputs.variant == 'Wild' }}
      shell: bash
      run: |
        cat >> "${{ github.workspace }}/wild_gki.fragment" << 'EOF'
        CONFIG_LOCALVERSION=""
        # CONFIG_LOCALVERSION_AUTO is not set
        EOF
